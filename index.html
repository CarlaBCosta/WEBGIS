<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal WebGIS - AMBIUM Digital</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="stylesheet" href="shared/style.css">
    <style>
        .landing { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:24px; text-align:center; padding:24px; }
        .landing img { height:48px; background:#f5f6f7; border-radius:8px; padding:8px 12px; }
        .landing p { color: var(--text-muted); max-width: 480px; }
        .landing code { background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="landing">
        <img src="assets/logo.png" alt="AMBIUM Digital">
        <h1>Portal WebGIS</h1>
        <p>Cada cliente tem seu próprio link, no formato <code>/clientes/&lt;id-do-cliente&gt;/</code>.</p>
        <p>Exemplo: <a href="clientes/cliente-demo/" style="color: var(--primary-light);">clientes/cliente-demo/</a></p>
    </div>
</body>
</html>
